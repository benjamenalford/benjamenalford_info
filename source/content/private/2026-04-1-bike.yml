title: "miles"
body: |
  bikes are incredibly simple.  I've been tinkering and riding biycles since roughly 1990, probably earlier. configs:
    I recently decided to ride again, but being me needed to make sure my bikes were in order. configs:
    Over the years, I've collected a number of bikes and ~for reasons~ have ended up with nothing but italian race bikes, and this Specialized Allez.
    I bought the allez as it was cheap, I traded my Kona Unit to cover it.  I never rode it. configs:
      I took it out finally and it wasn't so bad, 2cm smaller than usual, dreaded Shimano shifting, but if felt ok for aluminun.
      In a late night.
